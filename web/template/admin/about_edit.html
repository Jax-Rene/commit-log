{{template "base" .}}

{{define "content"}}
{{$initial := dict "mode" "about" "content" .content "updatedAt" .updatedAt}}

<style>
    .about-editor-shell .milkdown {
        min-height: 64vh;
        border-radius: 1rem;
        border: 1px solid rgba(148, 163, 184, 0.28);
        background: rgba(255, 255, 255, 0.94);
        --crepe-color-background: transparent;
    }

    .about-editor-shell .milkdown .ProseMirror {
        min-height: 60vh;
        padding: 1.25rem 1rem 1.5rem;
    }

    @media (prefers-color-scheme: dark) {
        .about-editor-shell .milkdown {
            border-color: rgba(71, 85, 105, 0.75);
            background: rgba(15, 23, 42, 0.82);
            --crepe-color-on-background: #ffffff;
        }
    }
</style>

<div
    class="about-editor-shell space-y-6"
    x-data="aboutMiniEditor({{$initial | toJSON}})"
    x-init="init()"
    x-cloak
>
    <header
        class="flex flex-col gap-4 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm transition-colors dark:border-slate-800 dark:bg-slate-900/80 lg:flex-row lg:items-center lg:justify-between"
    >
        <div class="space-y-2">
            <h1 class="text-3xl font-semibold text-slate-900 dark:text-slate-100">
                编辑 About Me
            </h1>
            <p class="text-sm text-slate-500 dark:text-slate-400">
                使用与文章一致的编辑器，已移除摘要和全文优化，仅保留排版与图片上传能力。
            </p>
            <p
                x-show="updatedAt"
                x-cloak
                class="text-xs text-slate-400 dark:text-slate-500"
            >
                最近保存：<span x-text="updatedAt"></span>
            </p>
        </div>
        <div class="flex flex-col gap-3 sm:flex-row">
            <a
                href="/about"
                target="_blank"
                class="inline-flex items-center justify-center rounded-lg border border-slate-200 px-4 py-2 text-sm font-medium text-slate-600 transition-colors hover:bg-slate-100 hover:text-slate-900 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-800 dark:hover:text-slate-100"
                >查看前台页面</a
            >
            <button
                type="button"
                @click="save()"
                :disabled="saving || !editorReady"
                class="inline-flex items-center justify-center rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white transition-colors hover:bg-blue-500 disabled:cursor-not-allowed disabled:bg-slate-300 dark:hover:bg-blue-500/90 dark:disabled:bg-slate-700/80"
            >
                <span x-show="!saving">保存</span>
                <span x-show="saving" class="ui-loading ui-loading-sm">保存中...</span>
            </button>
        </div>
    </header>

    {{if .error}}
    <div
        class="rounded-2xl border border-rose-200 bg-rose-50 p-6 text-sm text-rose-600 dark:border-rose-500/50 dark:bg-rose-500/10 dark:text-rose-200"
    >
        {{.error}}
    </div>
    {{end}}

    <section
        class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm transition-colors dark:border-slate-800 dark:bg-slate-900/80 sm:p-6"
    >
        <p class="mb-4 text-xs text-slate-500 dark:text-slate-400">
            支持 Markdown 排版、表格与图片上传，保存后将立即生效到 About Me 页面。
        </p>
        <div id="milkdown-app" class="milkdown"></div>
    </section>
</div>

<script>
    window.__MILKDOWN_V2__ = {{$initial | toJSON}};

    document.addEventListener("alpine:init", () => {
        const toast =
            window.AdminUI?.toast ||
            ((payload) => {
                const message =
                    typeof payload === "string" ? payload : payload?.message;
                if (message) {
                    console.log("[toast]", message);
                }
            });

        Alpine.data("aboutMiniEditor", (initialState = {}) => ({
            saving: false,
            editorReady: false,
            updatedAt:
                typeof initialState.updatedAt === "string"
                    ? initialState.updatedAt
                    : "",
            init() {
                this.waitForEditor();
                this.bindCleanup();
            },
            waitForEditor(retry = 0) {
                const editor = window.MilkdownV2;
                if (
                    editor &&
                    editor.mode === "about" &&
                    typeof editor.saveAbout === "function"
                ) {
                    this.editorReady = true;
                    const latest = editor.controller?.updatedAt;
                    if (typeof latest === "string" && latest.trim()) {
                        this.updatedAt = latest;
                    }
                    return;
                }
                if (retry >= 100) {
                    toast({
                        message: "编辑器加载超时，请刷新页面重试",
                        type: "error",
                    });
                    return;
                }
                window.setTimeout(() => this.waitForEditor(retry + 1), 100);
            },
            async save() {
                if (this.saving) {
                    return;
                }
                const saveAbout = window.MilkdownV2?.saveAbout;
                if (typeof saveAbout !== "function") {
                    toast({
                        message: "编辑器尚未就绪，请稍后再试",
                        type: "warning",
                    });
                    return;
                }

                this.saving = true;
                try {
                    const saved = await saveAbout();
                    if (saved) {
                        const latest = window.MilkdownV2?.controller?.updatedAt;
                        if (typeof latest === "string" && latest.trim()) {
                            this.updatedAt = latest;
                        }
                    }
                } finally {
                    this.saving = false;
                }
            },
            bindCleanup() {
                let cleaned = false;
                const cleanup = () => {
                    if (cleaned) {
                        return;
                    }
                    cleaned = true;
                    const controller = window.MilkdownV2?.controller;
                    if (controller && typeof controller.dispose === "function") {
                        try {
                            controller.dispose();
                        } catch (error) {
                            console.error(
                                "[milkdown] 清理 About 控制器失败",
                                error,
                            );
                        }
                    }
                    const crepe = window.MilkdownV2?.crepe;
                    if (crepe && typeof crepe.destroy === "function") {
                        void crepe.destroy();
                    }
                };
                window.addEventListener("pagehide", cleanup, { once: true });
                window.addEventListener("beforeunload", cleanup, {
                    once: true,
                });
            },
        }));
    });
</script>
<script type="module" src="/static/dist/assets/milkdown_v2.js"></script>
{{end}}
